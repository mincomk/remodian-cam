server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # SSE — buffering must be off or events are held until the buffer fills
    location /events {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 1h;
    }

    # All other backend API routes
    location ~ ^/(volume|power|mode) {
        proxy_pass http://backend:3000;
        proxy_http_version 1.1;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
