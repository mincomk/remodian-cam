services:
  backend:
    image: ghcr.io/mincomk/remodian-backend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "3000:3000"
    environment:
      - CROP=${CROP}
      - CAM_URL=${CAM_URL:-}
      - IR_URL=${IR_URL:-}
      - PORT=3000
    restart: unless-stopped

  frontend:
    image: ghcr.io/mincomk/remodian-frontend:${IMAGE_TAG:-latest}
    pull_policy: always
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
